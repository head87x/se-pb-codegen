# ============================================================
# Optionaler SFTP-Deploy zu einem eigenen Webhost
# ============================================================
# Was passiert:
#   - Jedes Mal wenn jemand zum Branch 'main' pusht, läuft
#     diese GitHub-Action.
#   - Sie checkt den aktuellen Code aus, kopiert nur die für
#     den Browser nötigen Dateien in einen Ordner _deploy/
#     und lädt diese per SFTP (Port 22, verschlüsselt über SSH)
#     auf einen Webserver.
#
# Voraussetzungen (im Repo unter Settings → Secrets → Actions):
#   DEPLOY_HOST       — der SFTP-Server
#   DEPLOY_USERNAME   — dein SFTP-Benutzername
#   DEPLOY_PASSWORD   — dein SFTP-Passwort
#   DEPLOY_SERVER_DIR — Pfad auf dem Server, z. B. "/path/"
#                       (Slash am Ende wird automatisch ergänzt)
#
# Manuelles Auslösen: im GitHub-Repo unter "Actions" →
#   "Deploy" → "Run workflow".
#
# Hinweis: Wer kein eigenes Hosting nutzt, kann GitHub Pages
# als Alternative im Repo unter Settings → Pages aktivieren.
# Dann braucht's dieses Workflow nicht.
# ============================================================

name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP Mirror Upload
    runs-on: ubuntu-latest

    steps:
      - name: Code aus dem Repo holen
        uses: actions/checkout@v4

      - name: Deploy-Ordner zusammenstellen
        run: |
          mkdir -p _deploy
          cp index.html _deploy/
          cp -r src _deploy/
          # Optional: README + CHANGELOG mit hochladen (transparent für Besucher)
          cp README.md CHANGELOG.md _deploy/ 2>/dev/null || true
          echo "--- Inhalt von _deploy/ ---"
          find _deploy -maxdepth 3 -type f | sort

      - name: Server-Dir normalisieren (Slash am Ende sicherstellen)
        id: dir
        shell: bash
        run: |
          DIR='${{ secrets.DEPLOY_SERVER_DIR }}'
          case "$DIR" in
            */) ;;
            *)  DIR="$DIR/" ;;
          esac
          # Wenn Secret leer ist, default auf "/"
          if [ -z "$DIR" ] || [ "$DIR" = "/" ]; then DIR="/"; fi
          echo "server_dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: lftp installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Per SFTP hochladen (lftp mirror)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USERNAME }}
          PASS: ${{ secrets.DEPLOY_PASSWORD }}
          DIR:  ${{ steps.dir.outputs.server_dir }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set net:timeout 20
            set net:max-retries 2
            set net:reconnect-interval-base 5
            open -u \"$USER\",\"$PASS\" sftp://\"$HOST\"
            lcd _deploy
            mirror --reverse --verbose --parallel=4 . \"$DIR\"
            bye
          "
