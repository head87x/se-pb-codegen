# ============================================================
# Auto-Deploy zu IONOS (sepb.teamllw.de)
# ============================================================
# Was passiert:
#   - Jedes Mal wenn jemand zum Branch 'main' pusht, läuft
#     diese GitHub-Action.
#   - Sie checkt den aktuellen Code aus, kopiert nur die für
#     den Browser nötigen Dateien in einen Ordner _deploy/
#     und lädt diese per SFTP (Port 22, verschlüsselt über SSH)
#     auf den IONOS-Webspace.
#
# Voraussetzungen (im Repo unter Settings → Secrets → Actions):
#   IONOS_HOST       — der SFTP-Server (z. B. access-XXX.webspace-data.io)
#   IONOS_USERNAME   — dein SFTP-Benutzername
#   IONOS_PASSWORD   — dein SFTP-Passwort
#   IONOS_SERVER_DIR — Pfad auf dem Server, z. B. "/sepb/"
#                       (Slash am Ende wird automatisch ergänzt)
#
# Manuelles Auslösen: im GitHub-Repo unter "Actions" →
#   "Auto-Deploy zu IONOS" → "Run workflow".
# ============================================================

name: Auto-Deploy zu IONOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy zu sepb.teamllw.de
    runs-on: ubuntu-latest

    steps:
      - name: Code aus dem Repo holen
        uses: actions/checkout@v4

      - name: Deploy-Ordner zusammenstellen
        run: |
          mkdir -p _deploy
          cp index.html _deploy/
          cp -r src _deploy/
          # Optional: README + CHANGELOG mit hochladen (transparent für Besucher)
          cp README.md CHANGELOG.md _deploy/ 2>/dev/null || true
          echo "--- Inhalt von _deploy/ ---"
          find _deploy -maxdepth 3 -type f | sort

      - name: Server-Dir normalisieren (Slash am Ende sicherstellen)
        id: dir
        shell: bash
        run: |
          DIR='${{ secrets.IONOS_SERVER_DIR }}'
          case "$DIR" in
            */) ;;
            *)  DIR="$DIR/" ;;
          esac
          # Wenn Secret leer ist, default auf "/"
          if [ -z "$DIR" ] || [ "$DIR" = "/" ]; then DIR="/"; fi
          echo "server_dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: lftp installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Diagnose — wo lande ich nach SFTP-Login?
        env:
          HOST: ${{ secrets.IONOS_HOST }}
          USER: ${{ secrets.IONOS_USERNAME }}
          PASS: ${{ secrets.IONOS_PASSWORD }}
          DIR:  ${{ steps.dir.outputs.server_dir }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set net:timeout 20
            open -u \"$USER\",\"$PASS\" sftp://\"$HOST\"
            echo '---PWD nach Login:---'
            pwd
            echo '---Inhalt Root (.):'
            cls -la .
            echo '---Versuch: cd nach \"$DIR\"---'
            cd \"$DIR\" || echo 'cd FEHLGESCHLAGEN — Ordner existiert nicht'
            echo '---PWD nach cd:'
            pwd
            echo '---Inhalt aktuelles Verzeichnis:'
            cls -la .
            bye
          "

      - name: Per SFTP hochladen (lftp mirror)
        env:
          HOST: ${{ secrets.IONOS_HOST }}
          USER: ${{ secrets.IONOS_USERNAME }}
          PASS: ${{ secrets.IONOS_PASSWORD }}
          DIR:  ${{ steps.dir.outputs.server_dir }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set net:timeout 20
            set net:max-retries 2
            set net:reconnect-interval-base 5
            open -u \"$USER\",\"$PASS\" sftp://\"$HOST\"
            lcd _deploy
            mirror --reverse --verbose --parallel=4 . \"$DIR\"
            bye
          "
